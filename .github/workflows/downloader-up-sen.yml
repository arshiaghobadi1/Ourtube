name: 01 - Maked By Ai-YT-uploadsenter

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 لینک ویدیو ( چند لینک با فاصله )'
        required: true
        type: string
      download_subtitles:
        description: '📝 زیرنویس ( فارسی و انگلیسی )'
        required: false
        default: false
        type: boolean
      quality:
        description: '🎬 کیفیت و نوع'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      password:
        description: '🔒 رمز ( اختیاری برای محافظت )'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  get-video:
    name: "📥 دانلود ویدیو"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Check URL provided
        run: |
          if [ -z "${{ github.event.inputs.video_urls }}" ]; then
            echo "❌ No video URL provided!"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Setup YouTube Cookies
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" | base64 -d > cookies.txt 2>/dev/null || echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            echo "✅ Cookies loaded from secrets"
          else
            echo "⚠️ No cookies found"
          fi

      - name: Start WARP Container
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "Waiting for WARP to initialize (20 seconds)..."
          sleep 20
          for i in {1..8}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              break
            else
              echo "Attempt $i/8 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc unzip
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip3 install --upgrade yt-dlp

      - name: Download YouTube Video(s)
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.password }}
          REPO_OWNER_ENV: ${{ github.repository_owner }}
          REPO_NAME_ENV: ${{ github.event.repository.name }}
          BRANCH_ENV: ${{ github.ref_name }}
        run: |
          chmod +x .github/scripts/download_yt.sh
          .github/scripts/download_yt.sh

      - name: Download Subtitles
        if: ${{ github.event.inputs.download_subtitles == 'true' }}
        run: |
          chmod +x .github/scripts/subtitles.sh
          .github/scripts/subtitles.sh

      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      # ============ قسمت جدید: آپلود به آپلودسنتر ============
      
      - name: Prepare files for upload
        run: |
          echo "📦 Preparing files for upload to Uplod.ir..."
          
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          echo "Backup directory: $BACKUP_DIR"
          
          # ایجاد پوشه برای آپلود
          mkdir -p upload_files
          
          # کپی فایل‌ها
          if [ -d "$BACKUP_DIR" ]; then
            for video_dir in "$BACKUP_DIR"/*/; do
              if [ -d "$video_dir" ]; then
                cp -r "$video_dir"/* upload_files/ 2>/dev/null || true
              fi
            done
            echo "✅ Files copied to upload_files/"
          fi
          
          # لیست فایل‌ها
          echo "📋 Files to upload:"
          ls -la upload_files/ || echo "No files found"
          
          # ایجاد فایل اطلاعاتی
          echo "# 📥 لینک‌های دانلود از آپلودسنتر" > DOWNLOAD_LINKS.md
          echo "" >> DOWNLOAD_LINKS.md
          echo "**تاریخ:** $(date)" >> DOWNLOAD_LINKS.md
          echo "**کیفیت:** ${{ github.event.inputs.quality }}" >> DOWNLOAD_LINKS.md
          echo "" >> DOWNLOAD_LINKS.md
          echo "---" >> DOWNLOAD_LINKS.md
          echo "" >> DOWNLOAD_LINKS.md

      - name: Upload to Uplod.ir
        run: |
          echo "📤 Uploading files to Uplod.ir..."
          
          # آپلود هر فایل به صورت جداگانه
          for file in upload_files/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              filesize=$(stat -c%s "$file")
              filesize_mb=$(echo "scale=2; $filesize / 1024 / 1024" | bc)
              
              echo "=========================================="
              echo "Uploading: $filename (${filesize_mb} MB)"
              echo "=========================================="
              
              # آپلود به آپلودسنتر
              response=$(curl -s -X POST \
                -F "file=@$file" \
                -H "Authorization: Bearer ${{ secrets.UPLODIR_API_KEY }}" \
                "https://api.uplod.ir/v1/upload")
              
              echo "Response: $response"
              
              # استخراج لینک از پاسخ
              download_url=$(echo "$response" | jq -r '.data.link // .link // .url // empty')
              
              if [ -n "$download_url" ] && [ "$download_url" != "null" ]; then
                echo "✅ Upload successful!"
                echo "🔗 Link: $download_url"
                echo "- **$filename** (${filesize_mb} MB) → [دانلود]($download_url)" >> DOWNLOAD_LINKS.md
              else
                echo "❌ Upload failed for $filename"
                echo "- **$filename** (${filesize_mb} MB) → ❌ آپلود ناموفق" >> DOWNLOAD_LINKS.md
              fi
              
              echo ""
              sleep 2  # تاخیر بین آپلودها
            fi
          done
          
          echo "" >> DOWNLOAD_LINKS.md
          echo "---" >> DOWNLOAD_LINKS.md
          echo "*Created by AVASAM*" >> DOWNLOAD_LINKS.md
          
          # نمایش لینک‌های نهایی
          echo "=========================================="
          echo "📋 Final Download Links:"
          echo "=========================================="
          cat DOWNLOAD_LINKS.md

      - name: Save download links to repository
        run: |
          # ایجاد پوشه برای لینک‌ها
          mkdir -p download_links
          
          # کپی فایل لینک‌ها با تاریخ
          cp DOWNLOAD_LINKS.md "download_links/links_$(date +%Y%m%d_%H%M%S).md"
          
          # آپدیت README اصلی
          cat > README_DOWNLOADS.md << 'EOF'
          # 📥 لینک‌های دانلود ویدیوها
          
          آخرین ویدیوهای دانلود شده در اینجا قرار می‌گیرند.
          
          برای دانلود، روی لینک‌های زیر کلیک کنید:
          
          EOF
          
          cat DOWNLOAD_LINKS.md >> README_DOWNLOADS.md
          
          # commit و push
          git add download_links/ README_DOWNLOADS.md
          git commit -m "Add download links from Uplod.ir [skip ci]" || echo "No changes to commit"
          git push origin main
          
          echo "=========================================="
          echo "✅ Download links saved to repository!"
          echo "=========================================="
